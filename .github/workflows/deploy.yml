name: Deploy Data
on:
  push:
    branches: [ "deploy" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: samsanchezctrl
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: samsanchezctrl/db-perritos:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Private EC2 via SSH Proxy
        uses: appleboy/ssh-action@master
        with:
          host: 10.0.159.53           # IP Privada Data
          username: ec2-user
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          proxy_host: 18.209.107.114 # Uso el Frontend como puente igual que en el Backend
          proxy_username: ec2-user
          proxy_key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            sudo docker pull samsanchezctrl/db-perritos:latest
            # Como usamos docker-compose en Data, ejecutamos:
            sudo docker-compose down || true
            sudo docker-compose up -d